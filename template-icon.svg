<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8F0000"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CC3333"/>
      <stop offset="100%" stop-color="#8F0000"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="800" rx="40" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g fill="white" opacity="0.04">
    <circle cx="100" cy="100" r="2"/><circle cx="200" cy="100" r="2"/>
    <circle cx="300" cy="100" r="2"/><circle cx="400" cy="100" r="2"/>
    <circle cx="500" cy="100" r="2"/><circle cx="600" cy="100" r="2"/>
    <circle cx="700" cy="100" r="2"/>
    <circle cx="100" cy="200" r="2"/><circle cx="300" cy="200" r="2"/>
    <circle cx="500" cy="200" r="2"/><circle cx="700" cy="200" r="2"/>
    <circle cx="100" cy="300" r="2"/><circle cx="200" cy="300" r="2"/>
    <circle cx="400" cy="300" r="2"/><circle cx="600" cy="300" r="2"/>
    <circle cx="700" cy="300" r="2"/>
    <circle cx="100" cy="400" r="2"/><circle cx="300" cy="400" r="2"/>
    <circle cx="500" cy="400" r="2"/><circle cx="700" cy="400" r="2"/>
    <circle cx="100" cy="500" r="2"/><circle cx="200" cy="500" r="2"/>
    <circle cx="400" cy="500" r="2"/><circle cx="600" cy="500" r="2"/>
    <circle cx="700" cy="500" r="2"/>
    <circle cx="100" cy="600" r="2"/><circle cx="300" cy="600" r="2"/>
    <circle cx="500" cy="600" r="2"/><circle cx="700" cy="600" r="2"/>
    <circle cx="100" cy="700" r="2"/><circle cx="200" cy="700" r="2"/>
    <circle cx="400" cy="700" r="2"/><circle cx="600" cy="700" r="2"/>
    <circle cx="700" cy="700" r="2"/>
  </g>
  <!-- Flow diagram visualization -->
  <g transform="translate(400, 340)">
    <!-- Node 1: HTTP Input -->
    <rect x="-220" y="-60" width="120" height="50" rx="8" fill="#8F0000" opacity="0.2" stroke="#CC0000" stroke-width="2"/>
    <rect x="-210" y="-52" width="16" height="34" rx="3" fill="url(#node)"/>
    <text x="-160" y="-32" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">HTTP</text>
    <text x="-160" y="-18" font-family="Arial, sans-serif" font-size="9" fill="#CC9999" text-anchor="middle">Input</text>
    <circle cx="-100" cy="-35" r="5" fill="#CC0000"/>

    <!-- Connection line 1 -->
    <line x1="-95" y1="-35" x2="-70" y2="-35" stroke="#CC0000" stroke-width="2" opacity="0.6"/>
    <polygon points="-70,-31 -62,-35 -70,-39" fill="#CC0000" opacity="0.6"/>

    <!-- Node 2: Function -->
    <rect x="-60" y="-60" width="120" height="50" rx="8" fill="#CC6666" opacity="0.2" stroke="#CC6666" stroke-width="2"/>
    <rect x="-50" y="-52" width="16" height="34" rx="3" fill="#CC6666"/>
    <text x="-10" y="-32" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Function</text>
    <text x="-10" y="-18" font-family="Arial, sans-serif" font-size="9" fill="#FFCCCC" text-anchor="middle">Transform</text>
    <circle cx="60" cy="-35" r="5" fill="#CC6666"/>

    <!-- Connection line 2 -->
    <line x1="65" y1="-35" x2="90" y2="-35" stroke="#CC6666" stroke-width="2" opacity="0.6"/>
    <polygon points="90,-31 98,-35 90,-39" fill="#CC6666" opacity="0.6"/>

    <!-- Node 3: MQTT Output -->
    <rect x="100" y="-60" width="120" height="50" rx="8" fill="#336699" opacity="0.2" stroke="#4488BB" stroke-width="2"/>
    <rect x="110" y="-52" width="16" height="34" rx="3" fill="#4488BB"/>
    <text x="160" y="-32" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">MQTT</text>
    <text x="160" y="-18" font-family="Arial, sans-serif" font-size="9" fill="#99CCEE" text-anchor="middle">Output</text>

    <!-- Bottom row: Debug node -->
    <rect x="-80" y="30" width="160" height="50" rx="8" fill="#336633" opacity="0.2" stroke="#44AA44" stroke-width="2"/>
    <rect x="-70" y="38" width="16" height="34" rx="3" fill="#44AA44"/>
    <text x="0" y="58" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Debug</text>
    <text x="0" y="72" font-family="Arial, sans-serif" font-size="9" fill="#99EE99" text-anchor="middle">Console Output</text>

    <!-- Connection from Function to Debug -->
    <line x1="0" y1="-10" x2="0" y2="25" stroke="#CC6666" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
    <polygon points="-4,25 0,30 4,25" fill="#CC6666" opacity="0.4"/>
  </g>
  <!-- Label -->
  <text x="400" y="560" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="white" text-anchor="middle" letter-spacing="3">NODE-RED</text>
  <text x="400" y="600" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="rgba(255,255,255,0.65)" text-anchor="middle" letter-spacing="3">LOW-CODE PROGRAMMING</text>
</svg>
