<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1A1A2E"/><stop offset="100%" stop-color="#0A0A15"/></linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#CC0000"/><stop offset="100%" stop-color="#8F0000"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#4488BB"/><stop offset="100%" stop-color="#1E4D6E"/></linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <circle cx="400" cy="400" r="200" stroke="#CC0000" stroke-width="1" opacity="0.1"/>
  <!-- Flow nodes -->
  <g transform="translate(400,400)">
    <!-- Node connections -->
    <line x1="-180" y1="-40" x2="-100" y2="-40" stroke="#93C5FD" stroke-width="3" opacity="0.2"/>
    <line x1="-100" y1="-20" x2="-20" y2="-20" stroke="#93C5FD" stroke-width="3" opacity="0.2"/>
    <line x1="-20" y1="0" x2="60" y2="0" stroke="#93C5FD" stroke-width="3" opacity="0.2"/>
    <line x1="60" y1="20" x2="140" y2="20" stroke="#93C5FD" stroke-width="3" opacity="0.2"/>
    <line x1="-60" y1="40" x2="60" y2="40" stroke="#93C5FD" stroke-width="3" opacity="0.2"/>
    <!-- Node 1 - input -->
    <circle cx="-180" cy="-40" r="22" fill="url(#red)" opacity="0.7"/>
    <circle cx="-180" cy="-40" r="10" fill="#CC3333" opacity="0.5"/>
    <!-- Node 2 -->
    <circle cx="-100" cy="-40" r="18" fill="url(#blue)" opacity="0.6"/>
    <circle cx="-100" cy="-40" r="8" fill="#93C5FD" opacity="0.3"/>
    <!-- Node 3 -->
    <circle cx="-20" cy="-20" r="18" fill="url(#blue)" opacity="0.7"/>
    <!-- Node 4 -->
    <circle cx="60" cy="0" r="24" fill="url(#red)" opacity="0.65"/>
    <!-- Node 5 -->
    <circle cx="140" cy="20" r="14" fill="url(#blue)" opacity="0.5"/>
    <!-- Node 6 -->
    <circle cx="-60" cy="40" r="16" fill="url(#blue)" opacity="0.55"/>
    <circle cx="60" cy="40" r="20" fill="url(#red)" opacity="0.6"/>
  </g>
</svg>