<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CC0000"/><stop offset="100%" stop-color="#6C3FC5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <!-- Large flow nodes -->
  <g transform="translate(400,390)">
    <line x1="-190" y1="-50" x2="-110" y2="-50" stroke="#FFFFFF" stroke-width="6"/>
    <line x1="-110" y1="-30" x2="-30" y2="-30" stroke="#FFFFFF" stroke-width="6"/>
    <line x1="-30" y1="-10" x2="50" y2="-10" stroke="#FFFFFF" stroke-width="6"/>
    <line x1="50" y1="10" x2="170" y2="10" stroke="#FFFFFF" stroke-width="6"/>
    <line x1="-70" y1="50" x2="70" y2="50" stroke="#FFFFFF" stroke-width="6"/>
    <circle cx="-190" cy="-50" r="28" fill="#FFFFFF"/>
    <circle cx="-110" cy="-50" r="24" fill="#FFFFFF"/>
    <circle cx="-30" cy="-30" r="24" fill="#FFFFFF"/>
    <circle cx="50" cy="-10" r="32" fill="#FFFFFF"/>
    <circle cx="170" cy="10" r="20" fill="#FFFFFF"/>
    <circle cx="-70" cy="50" r="22" fill="#FFFFFF"/>
    <circle cx="70" cy="50" r="26" fill="#FFFFFF"/>
    <!-- Inner dots -->
    <circle cx="-110" cy="-50" r="8" fill="#CC0000"/>
    <circle cx="50" cy="-10" r="12" fill="#CC0000"/>
    <circle cx="170" cy="10" r="6" fill="#CC0000"/>
